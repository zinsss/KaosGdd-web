services:
  backend:
    build: ./backend
    container_name: kaosgdd-backend
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data:/data
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: kaosgdd-frontend
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
    depends_on:
      - backend
    restart: unless-stopped
